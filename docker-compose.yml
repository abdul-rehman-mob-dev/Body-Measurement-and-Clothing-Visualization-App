version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: bodyfitai-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: bodyfitai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d bodyfitai']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bodyfitai-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  node-api:
    build:
      context: ./server/node
      dockerfile: Dockerfile
    container_name: bodyfitai-node-api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bodyfitai
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://python-ai:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  python-ai:
    build:
      context: ./server/python
      dockerfile: Dockerfile
    container_name: bodyfitai-python-ai
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/bodyfitai
      - REDIS_URL=redis://redis:6379

volumes:
  postgres_data:
  redis_data:
